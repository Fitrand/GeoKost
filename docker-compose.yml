version: "3.9"

services:
  # ─── PostgreSQL + PostGIS ───────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: geokost_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: geokost_password
      POSTGRES_DB: geokost
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geokost_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ─── FastAPI Backend ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geokost_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:geokost_password@db:5432/geokost
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
      - ./backend/models_pkl:/app/models_pkl
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Next.js Frontend ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geokost_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
