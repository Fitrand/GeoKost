name: Deploy GeoKost Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:  # Bisa trigger manual dari GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout kode ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install system dependencies (PostGIS/GDAL) ─────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libpq-dev gcc

      # ── 4. Install Python dependencies ────────────────────────
      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Zip backend untuk deployment ───────────────────────
      - name: Zip backend artifact
        run: |
          cd backend
          zip -r ../release.zip . \
            --exclude ".env" \
            --exclude "venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".git/*" \
            --exclude "out.json" \
            --exclude "out2.json"

      # ── 6. Deploy ke Azure App Service ────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}        # contoh: api-geokost
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: release.zip
